services:
  postgres:
    image: postgres:17
    container_name: skala-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skala
      POSTGRES_PASSWORD: skala1229
      POSTGRES_DB: concert
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: skala-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  user-auth-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: team4-user-auth-service
    restart: unless-stopped
    build:
      context: .
      dockerfile: user-auth-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert?currentSchema=auth,queue,concert,ticketing,payment,public
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      USER_AUTH_INTERNAL_API_TOKEN: dev-user-auth-internal-token
      MAIL_USERNAME: fairlineTicket@gmail.com
      MAIL_PASSWORD: kudkmzqbpchhovjd
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Fairline Ticket Team}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18081:8080"

  concert-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: team4-concert-service
    restart: unless-stopped
    build:
      context: .
      dockerfile: concert-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert?currentSchema=concert,public
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      CONCERT_INTERNAL_API_TOKEN: dev-concert-internal-token
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18082:8080"

  queue-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: team4-queue-service
    restart: unless-stopped
    build:
      context: .
      dockerfile: queue-service/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      USER_AUTH_SERVICE_BASE_URL: http://user-auth-service:8080
      CONCERT_SERVICE_BASE_URL: http://concert-service:8080
      USER_AUTH_INTERNAL_API_TOKEN: dev-user-auth-internal-token
      CONCERT_INTERNAL_API_TOKEN: dev-concert-internal-token
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "18083:8080"

  ticketing-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: team4-ticketing-service
    restart: unless-stopped
    build:
      context: .
      dockerfile: ticketing-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert?currentSchema=ticketing,concert,public
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      USER_AUTH_SERVICE_BASE_URL: http://user-auth-service:8080
      USER_AUTH_INTERNAL_API_TOKEN: dev-user-auth-internal-token
      TICKETING_INTERNAL_API_TOKEN: dev-ticketing-internal-token
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18084:8080"

  payment-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: team4-payment-service
    restart: unless-stopped
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert?currentSchema=payment,ticketing,concert,queue,auth,public
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
      TOSS_API_BASE: ${TOSS_API_BASE:-https://api.tosspayments.com}
      TOSS_CONFIRM_URL: ${TOSS_CONFIRM_URL:-https://api.tosspayments.com/v1/payments/confirm}
      TICKETING_SERVICE_BASE_URL: http://ticketing-service:8080
      TICKETING_INTERNAL_API_TOKEN: dev-ticketing-internal-token
      PAYMENT_SUCCESS_REDIRECT_URL: http://localhost:5173/payments/success
      PAYMENT_FAIL_REDIRECT_URL: http://localhost:5173/payments/fail
      PAYMENT_OPS_API_TOKEN: dev-payment-ops-token
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18085:8080"

  frontend:
    image: team4-frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_USER_AUTH_API_URL: http://user-auth-service:8080
      VITE_CONCERT_API_URL: http://concert-service:8080
      VITE_QUEUE_API_URL: http://queue-service:8080
      VITE_TICKETING_API_URL: http://ticketing-service:8080
      VITE_PAYMENT_API_URL: http://payment-service:8080
      VITE_TOSS_CLIENT_KEY: ${VITE_TOSS_CLIENT_KEY:-}
    depends_on:
      - user-auth-service
      - concert-service
      - queue-service
      - ticketing-service
      - payment-service
    ports:
      - "5173:5173"

  kafka:
    image: apache/kafka:latest
    container_name: skala-kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

volumes:
  postgres-data:
  kafka-data:
