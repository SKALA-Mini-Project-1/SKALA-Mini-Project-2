services:
  postgres:
    image: postgres:17
    container_name: skala-postgres
    environment:
      POSTGRES_USER: skala
      POSTGRES_PASSWORD: skala1229
      POSTGRES_DB: concert
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: skala-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  user-auth-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    image: team4-user-auth-service
    build:
      context: .
      dockerfile: user-auth-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      USER_AUTH_INTERNAL_API_TOKEN: dev-user-auth-internal-token
      MAIL_USERNAME: ${MAIL_USERNAME:fairlineTicket@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:kudkmzqbpchhovjd}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Fairline Ticket Team}
    depends_on:
      - postgres
      - redis
    ports:
      - "18081:8080"

  concert-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    image: team4-concert-service
    build:
      context: .
      dockerfile: concert-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      CONCERT_INTERNAL_API_TOKEN: dev-concert-internal-token
    depends_on:
      - postgres
      - redis
    ports:
      - "18082:8080"

  queue-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    image: team4-queue-service
    build:
      context: .
      dockerfile: queue-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      USER_AUTH_SERVICE_BASE_URL: http://user-auth-service:8080
      CONCERT_SERVICE_BASE_URL: http://concert-service:8080
      USER_AUTH_INTERNAL_API_TOKEN: dev-user-auth-internal-token
      CONCERT_INTERNAL_API_TOKEN: dev-concert-internal-token
    depends_on:
      - postgres
      - redis
    ports:
      - "18083:8080"

  ticketing-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    image: team4-ticketing-service
    build:
      context: .
      dockerfile: ticketing-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      USER_AUTH_SERVICE_BASE_URL: http://user-auth-service:8080
      USER_AUTH_INTERNAL_API_TOKEN: dev-user-auth-internal-token
      TICKETING_INTERNAL_API_TOKEN: dev-ticketing-internal-token
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "18084:8080"

  payment-service:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    image: team4-payment-service
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/concert
      DB_USER: skala
      DB_PASSWORD: skala1229
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-min-32-characters-long-for-hs256-algorithm-security
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
      TOSS_API_BASE: ${TOSS_API_BASE:-https://api.tosspayments.com}
      TOSS_CONFIRM_URL: ${TOSS_CONFIRM_URL:-https://api.tosspayments.com/v1/payments/confirm}
      TICKETING_SERVICE_BASE_URL: http://ticketing-service:8080
      TICKETING_INTERNAL_API_TOKEN: dev-ticketing-internal-token
      PAYMENT_SUCCESS_REDIRECT_URL: http://localhost:5173/payments/success
      PAYMENT_FAIL_REDIRECT_URL: http://localhost:5173/payments/fail
      PAYMENT_OPS_API_TOKEN: dev-payment-ops-token
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "18085:8080"

  frontend:
    image: team4-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_USER_AUTH_API_URL: http://user-auth-service:8080
      VITE_CONCERT_API_URL: http://concert-service:8080
      VITE_QUEUE_API_URL: http://queue-service:8080
      VITE_TICKETING_API_URL: http://ticketing-service:8080
      VITE_PAYMENT_API_URL: http://payment-service:8080
    depends_on:
      - user-auth-service
      - concert-service
      - queue-service
      - ticketing-service
      - payment-service
    ports:
      - "5173:5173"

  kafka:
    image: apache/kafka:latest
    container_name: skala-kafka
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka

volumes:
  postgres-data:
  kafka-data:
