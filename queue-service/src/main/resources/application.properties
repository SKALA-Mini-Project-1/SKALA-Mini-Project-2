spring.application.name=queue-service
server.port=${SERVER_PORT:8080}

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:7200000}

user-auth-service.base-url=${USER_AUTH_SERVICE_BASE_URL:http://user-auth-service:8080}
concert-service.base-url=${CONCERT_SERVICE_BASE_URL:http://concert-service:8080}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
user-auth.internal-api.token=${USER_AUTH_INTERNAL_API_TOKEN}
concert.internal-api.token=${CONCERT_INTERNAL_API_TOKEN}
queue.scheduler.cleanup.fixed-delay-ms=${QUEUE_CLEANUP_SCHEDULER_DELAY_MS:10000}
queue.scheduler.active-seat-sync.fixed-delay-ms=${QUEUE_ACTIVE_SEAT_SYNC_DELAY_MS:10000}
queue.redis.retry.max-attempts=${QUEUE_REDIS_RETRY_MAX_ATTEMPTS:2}
queue.redis.retry.wait-millis=${QUEUE_REDIS_RETRY_WAIT_MILLIS:80}
queue.runtime.max-seat-capacity=${QUEUE_MAX_SEAT_CAPACITY:500}

# HikariCP 튜닝
spring.datasource.hikari.maximum-pool-size=80
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000

# Tomcat 튜닝
server.tomcat.accept-count=500
server.tomcat.max-connections=2500
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=20
