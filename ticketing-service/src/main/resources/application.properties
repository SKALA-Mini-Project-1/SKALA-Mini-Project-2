spring.application.name=ticketing-service
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/concert}
spring.datasource.username=${DB_USER:skala}
spring.datasource.password=${DB_PASSWORD:skala1229}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s

jwt.secret=${JWT_SECRET:your-secret-key-min-32-characters-long-for-hs256-algorithm-security}
jwt.expiration=${JWT_EXPIRATION:7200000}

user-auth-service.base-url=${USER_AUTH_SERVICE_BASE_URL:http://user-auth-service:8080}
concert-service.base-url=${CONCERT_SERVICE_BASE_URL:http://concert-service:8080}
user-auth.internal-api.token=${USER_AUTH_INTERNAL_API_TOKEN:dev-user-auth-internal-token}
concert.internal-api.token=${CONCERT_INTERNAL_API_TOKEN:dev-concert-internal-token}
ticketing.internal-api.token=${TICKETING_INTERNAL_API_TOKEN:dev-ticketing-internal-token}
ticketing.fan-score.sync.fixed-delay-ms=${TICKETING_FAN_SCORE_SYNC_FIXED_DELAY_MS:60000}
ticketing.reconciliation.monitor.fixed-delay-ms=${TICKETING_RECONCILIATION_MONITOR_FIXED_DELAY_MS:30000}
ticketing.reconciliation.replay.fixed-delay-ms=${TICKETING_RECONCILIATION_REPLAY_FIXED_DELAY_MS:45000}
ticketing.reconciliation.retry.wait-ms=${TICKETING_RECONCILIATION_RETRY_WAIT_MS:60000}
ticketing.reconciliation.retry.max-auto-retry-count=${TICKETING_RECONCILIATION_MAX_AUTO_RETRY_COUNT:3}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Kafka (ticketing-outbox is published via Debezium CDC; consumer remains)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=ticketing-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=RECORD
