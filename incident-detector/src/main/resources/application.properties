server.port=${DETECTOR_PORT:18086}
spring.application.name=incident-detector

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/concert?currentSchema=incident,public}
spring.datasource.username=${DB_USER:skala}
spring.datasource.password=${DB_PASSWORD:skala1229}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=incident
spring.jpa.open-in-view=false

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# 탐지 임계값
detector.ghost-order.threshold-minutes=${DETECTOR_GHOST_ORDER_THRESHOLD_MINUTES:5}
detector.unconfirmed.paid-threshold-minutes=${DETECTOR_UNCONFIRMED_PAID_THRESHOLD_MINUTES:2}
detector.unconfirmed.webhook-threshold-minutes=${DETECTOR_UNCONFIRMED_WEBHOOK_THRESHOLD_MINUTES:2}
detector.zombie.grace-period-seconds=${DETECTOR_ZOMBIE_GRACE_PERIOD_SECONDS:60}
detector.severity.escalation-count=${DETECTOR_SEVERITY_ESCALATION_COUNT:10}
detector.severity.escalation-minutes=${DETECTOR_SEVERITY_ESCALATION_MINUTES:20}
detector.pending-check.fixed-delay-ms=${DETECTOR_PENDING_CHECK_DELAY_MS:30000}
detector.zombie-check.fixed-delay-ms=${DETECTOR_ZOMBIE_CHECK_DELAY_MS:30000}
