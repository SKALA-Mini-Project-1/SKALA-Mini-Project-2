spring.application.name=user-auth-service
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/concert}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:7200000}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

email.verification.code-length=6
email.verification.expiration-minutes=5
email.verification.resend-interval-seconds=60
email.from-address=${EMAIL_FROM_ADDRESS:no-reply@example.com}
email.from-name=${EMAIL_FROM_NAME:Fairline Ticket Team}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

user-auth.internal-api.token=${USER_AUTH_INTERNAL_API_TOKEN}

# HikariCP 튜닝
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000

# Tomcat 튜닝
server.tomcat.accept-count=200
server.tomcat.max-connections=400
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
