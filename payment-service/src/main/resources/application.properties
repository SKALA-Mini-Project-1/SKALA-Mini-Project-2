spring.application.name=payment-service
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/concert}
spring.datasource.username=${DB_USER:skala}
spring.datasource.password=${DB_PASSWORD:skala1229}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s

jwt.secret=${JWT_SECRET:your-secret-key-min-32-characters-long-for-hs256-algorithm-security}
jwt.expiration=${JWT_EXPIRATION:7200000}

toss.secret-key=${TOSS_SECRET_KEY:}
toss.api-base=${TOSS_API_BASE:https://api.tosspayments.com}
toss.confirm-url=${TOSS_CONFIRM_URL:https://api.tosspayments.com/v1/payments/confirm}
ticketing-service.base-url=${TICKETING_SERVICE_BASE_URL:http://ticketing-service:8080}
ticketing-service.finalization-path=${TICKETING_SERVICE_FINALIZATION_PATH:/internal/finalizations}
ticketing-service.internal-api-token=${TICKETING_INTERNAL_API_TOKEN:dev-ticketing-internal-token}
payment.redirect.success-url=${PAYMENT_SUCCESS_REDIRECT_URL:http://localhost:5173/payments/success}
payment.redirect.fail-url=${PAYMENT_FAIL_REDIRECT_URL:http://localhost:5173/payments/fail}
payment.ops-api.token=${PAYMENT_OPS_API_TOKEN:dev-payment-ops-token}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
