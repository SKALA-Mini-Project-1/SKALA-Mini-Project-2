spring.application.name=payment-service
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/concert}
spring.datasource.username=${DB_USER:skala}
spring.datasource.password=${DB_PASSWORD:skala1229}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s

jwt.secret=${JWT_SECRET:your-secret-key-min-32-characters-long-for-hs256-algorithm-security}
jwt.expiration=${JWT_EXPIRATION:7200000}

toss.secret-key=${TOSS_SECRET_KEY:}
toss.api-base=${TOSS_API_BASE:https://api.tosspayments.com}
toss.confirm-url=${TOSS_CONFIRM_URL:https://api.tosspayments.com/v1/payments/confirm}
ticketing-service.base-url=${TICKETING_SERVICE_BASE_URL:http://ticketing-service:8080}
ticketing-service.finalization-path=${TICKETING_SERVICE_FINALIZATION_PATH:/internal/finalizations}
ticketing-service.internal-api-token=${TICKETING_INTERNAL_API_TOKEN:dev-ticketing-internal-token}
payment.redirect.success-url=${PAYMENT_SUCCESS_REDIRECT_URL:http://localhost:5173/payments/success}
payment.redirect.fail-url=${PAYMENT_FAIL_REDIRECT_URL:http://localhost:5173/payments/fail}
payment.ops-api.token=${PAYMENT_OPS_API_TOKEN:dev-payment-ops-token}
payment.expiration.create-minutes=${PAYMENT_CREATE_EXPIRE_MINUTES:5}
payment.expiration.paying-hard-deadline-minutes=${PAYMENT_PAYING_HARD_DEADLINE_MINUTES:10}
payment.scheduler.expire.fixed-delay-ms=${PAYMENT_EXPIRE_SCHEDULER_DELAY_MS:15000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# Outbox relay
payment.outbox.topic=payment.events.v1
payment.outbox.relay.fixed-delay-ms=${PAYMENT_OUTBOX_RELAY_FIXED_DELAY_MS:5000}
payment.outbox.max-retry=${PAYMENT_OUTBOX_MAX_RETRY:5}
