server.port=${AGENT_PORT:18087}
spring.application.name=incident-agent

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/concert}
spring.datasource.username=${DB_USER:skala}
spring.datasource.password=${DB_PASSWORD:skala1229}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=incident

management.endpoints.web.exposure.include=health,info

# 폴링 설정
agent.poll.fixed-delay-ms=${AGENT_POLL_FIXED_DELAY_MS:10000}
agent.poll.batch-size=${AGENT_POLL_BATCH_SIZE:5}

# LLM 설정
agent.llm.model=${AGENT_LLM_MODEL:gpt-4o}
agent.llm.max-tokens=${AGENT_LLM_MAX_TOKENS:2048}
agent.llm.max-retry=${AGENT_LLM_MAX_RETRY:2}
agent.llm.api-key=${OPENAI_API_KEY}
